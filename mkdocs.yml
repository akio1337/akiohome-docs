site_name: AkioHome Documentation
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: es
  palette:
    - scheme: slate
      primary: deep orange
      accent: deep orange
repo_url: https://github.com/akio1337/akiohome
repo_name: akio1337/akiohome
extra:
  social:
    - icon: fontawesome/brands/twitch
      link: https://twitch.tv/akio1337
    - icon: fontawesome/brands/github
      link: https://github.com/akio1337

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list

copyright: |
  &copy; 2024 <a href="https://github.com/akio1337"  target="_blank" rel="noopener">Akio</a>